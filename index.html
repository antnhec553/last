<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

a-scene {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
embedded
device-orientation-permission-ui="enabled">

<a-assets>

<img id="img1" src="images/flap1.jpg">
<img id="img2" src="images/flap2.jpg">
<img id="img3" src="images/flap3.jpg">
<img id="img4" src="images/flap4.jpg">
<img id="img5" src="images/flap5.jpg">
<img id="img6" src="images/flap6.jpg">

 <!-- new video and audio -->
  <video id="vid1" src="videos/flap7.mp4" autoplay loop muted playsinline></video>
  <audio id="aud1" src="audio/flap8.wav" loop></audio>

</a-assets>

<a-camera position="0 0 0"></a-camera>

<!-- FLAP 1 -->

<a-entity mindar-image-target="targetIndex: 0">

<a-text
value="EDIT TEXT"
color="yellow"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane src="#img1" width="1.4" height="1"></a-plane>

</a-entity>

<!-- FLAP 2 -->

<a-entity mindar-image-target="targetIndex: 1">

<a-text
value="EDIT TEXT"
color="cyan"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane src="#img2" width="1.4" height="1"></a-plane>

</a-entity>

<!-- FLAP 3 -->

<a-entity mindar-image-target="targetIndex: 2">

<a-text
value="EDIT TEXT"
color="pink"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane color="white" width="1.5" height="1.1"></a-plane>
<a-plane src="#img3" width="1.4" height="1"></a-plane>

</a-entity>

<!-- FLAP 4 -->

<a-entity mindar-image-target="targetIndex: 3">

<a-text
value="EDIT TEXT"
color="orange"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane src="#img4" width="1.4" height="1"></a-plane>

</a-entity>

<!-- FLAP 5 -->

<a-entity mindar-image-target="targetIndex: 4">

<a-text
value="EDIT TEXT"
color="green"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane src="#img5" width="1.4" height="1"></a-plane>

</a-entity>

<!-- FLAP 6 -->

<a-entity mindar-image-target="targetIndex: 5">

<a-text
value="EDIT TEXT"
color="red"
align="center"
position="0 0.8 0"
scale="2 2 2">
</a-text>

<a-plane src="#img6" width="1.4" height="1"></a-plane>

</a-entity>

<a-entity mindar-image-target="targetIndex: 6">
  <a-text
    value="VIDEO FLAP"
    color="blue"
    align="center"
    position="0 0.8 0"
    scale="2 2 2">
  </a-text>

 <a-plane 
  position="0 0 0"
  width="1.4" 
  height="1"
  material="shader: flat; src: #vid1">
</a-plane>
  
</a-entity>

<a-entity mindar-image-target="targetIndex: 7">
  <a-text
    value="AUDIO FLAP"
    color="white"
    align="center"
    position="0 0.8 0"
    scale="2 2 2">
  </a-text>

  <a-plane color="black" width="1.4" height="1"></a-plane>
</a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.querySelector("#vid1");
  const audio = document.querySelector("#aud1");

  const videoTarget = document.querySelector('[mindar-image-target="targetIndex: 6"]');
  const audioTarget = document.querySelector('[mindar-image-target="targetIndex: 7"]');

    // force looping
  audio.loop = true;
  
  // unlock audio on first tap
  document.body.addEventListener("click", () => {
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
    });
  }, { once: true });

  // VIDEO
  videoTarget.addEventListener("targetFound", () => {
    video.play();
  });

  // AUDIO
  audioTarget.addEventListener("targetFound", () => {
    audio.play();
  });

  audioTarget.addEventListener("targetLost", () => {
    audio.pause();
    audio.currentTime = 0;
  });

});
</script>

</body>
</html>
